name: Check Docker on Runner

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  DOCKER_DIR: docker
  DOCKERFILE: Dockerfile
  IMAGE_NAME: lxb-001:ci

jobs:
  check-docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Show runner info
        run: |
          uname -a
          lsb_release -a || true
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          echo "DOCKER_DIR=${{ env.DOCKER_DIR }}"
          echo "DOCKERFILE=${{ env.DOCKERFILE }}"

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          cache: gradle

      - name: Build server module
        run: ./gradlew :server:clean :server:bootJar

      - name: Prepare Docker context
        run: |
          mkdir -p "${{ env.DOCKER_DIR }}"

          echo "==== server/build/libs ===="
          ls -la server/build/libs || exit 1

          JAR=$(find server/build/libs -name "*.jar" | head -n 1)

          if [ -z "$JAR" ]; then
            echo "❌ No JAR found in server/build/libs"
            exit 1
          fi

          echo "Using JAR: $JAR"
          cp "$JAR" "${{ env.DOCKER_DIR }}/server.jar"

          cp run.sh "${{ env.DOCKER_DIR }}/run.sh" || true
          cp version "${{ env.DOCKER_DIR }}/version" || true

      - name: Check Docker client & daemon
        run: |
          if command -v docker >/dev/null 2>&1; then
            echo "docker found at $(command -v docker)"
            docker --version || true
            if docker info >/dev/null 2>&1; then
              echo "Docker daemon is available"
            else
              echo "Docker daemon NOT available (rootless or not running)"
            fi
          else
            echo "docker NOT found on runner"
            exit 0
          fi

      - name: List repo root
        run: ls -la

      - name: Show Dockerfile directory contents
        run: |
          cd "${{ env.DOCKER_DIR }}" || \
            { echo "Directory not found: ${{ env.DOCKER_DIR }}"; exit 1; }
          echo "Now in: $(pwd)"
          ls -la
          echo "Dockerfile content:"
          sed -n '1,200p' "${{ env.DOCKERFILE }}" || true

      - name: Build Docker image
        run: |
          docker build \
            -f "${{ env.DOCKER_DIR }}/${{ env.DOCKERFILE }}" \
            -t "${{ env.IMAGE_NAME }}" \
            "${{ env.DOCKER_DIR }}"
