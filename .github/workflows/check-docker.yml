name: Check Docker on Runner

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  DOCKER_DIR: docker
  DOCKERFILE: Dockerfile
  IMAGE_NAME: lxb-001:ci

jobs:
  check-docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Show runner info
        run: |
          uname -a
          lsb_release -a || true
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          echo "DOCKER_DIR=${{ env.DOCKER_DIR }}"
          echo "DOCKERFILE=${{ env.DOCKERFILE }}"

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          cache: sbt

      - name: Cache sbt and Ivy
        uses: actions/cache@v4
        with:
          path: |
            ~/.ivy2/cache
            ~/.sbt
            ~/.coursier
            ~/.cache/coursier
          key: sbt-cache-${{ runner.os }}-${{ hashFiles('**/build.sbt') }}

      - name: Build with sbt (assembly)
        run: |
          sbt -v clean assembly
          working-directory: .

      - name: Prepare Docker context
        run: |
          mkdir -p "${{ env.DOCKER_DIR }}"
          cp target/scala-/yourapp-assembly-.jar \
            "${{ env.DOCKER_DIR }}/server.jar"
          cp run.sh "${{ env.DOCKER_DIR }}/run.sh" || true
          cp version "${{ env.DOCKER_DIR }}/version" || true

      - name: Check Docker client & daemon
        run: |
          if command -v docker >/dev/null 2>&1; then
            echo "docker found at $(command -v docker)"
            docker --version || true
            if docker info >/dev/null 2>&1; then
              echo "Docker daemon is available"
            else
              echo "Docker daemon NOT available (rootless or not running)"
            fi
          else
            echo "docker NOT found on runner"
            exit 0
          fi

      - name: List repo root
        run: ls -la

      - name: Show Dockerfile directory contents
        run: |
          cd "${{ env.DOCKER_DIR }}" || \
            { echo "Directory not found: ${{ env.DOCKER_DIR }}"; exit 1; }
          echo "Now in: $(pwd)"
          ls -la
          echo "Dockerfile content:"
          sed -n '1,200p' "${{ env.DOCKERFILE }}" || true

      - name: Build Docker image damm
        run: |
          docker build \
            -f "${{ env.DOCKER_DIR }}/${{ env.DOCKERFILE }}" \
            -t "${{ env.IMAGE_NAME }}" "${{ github.workspace }}"
